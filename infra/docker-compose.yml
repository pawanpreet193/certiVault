version: "3.8"
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: certivault
      POSTGRES_USER: sv_user
      POSTGRES_PASSWORD: sv_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  ipfs:
    image: ipfs/go-ipfs:latest
    restart: unless-stopped
    ports:
      - "5001:5001"   # API
      - "8080:8080"   # Gateway
      - "4001:4001"   # Swarm
    volumes:
      - ipfs-data:/data/ipfs

volumes:
  pgdata:
  ipfs-data:
